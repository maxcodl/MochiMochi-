name: Build & Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('Android/gradle/wrapper/gradle-wrapper.properties', 'Android/**/*.gradle') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x Android/gradlew

      - name: Build debug APK
        working-directory: Android
        run: ./gradlew assembleDebug --no-daemon

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > Android/app/mochimochi-release.jks

      - name: Build release APK (signed)
        working-directory: Android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/Android/app/mochimochi-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APKs
        run: |
          TAG=${GITHUB_REF_NAME:-dev}
          cp Android/app/build/outputs/apk/debug/app-debug.apk   MochiMochi-${TAG}-debug.apk
          cp Android/app/build/outputs/apk/release/app-release.apk MochiMochi-${TAG}-release.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MochiMochi-debug
          path: MochiMochi-*-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MochiMochi-release
          path: MochiMochi-*-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: MochiMochi ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            MochiMochi-*-debug.apk
            MochiMochi-*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
